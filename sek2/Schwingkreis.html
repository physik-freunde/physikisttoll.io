<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schwingkreis Simulation - Klassischer Schaltplan (Responsive)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            display: flex;
            gap: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 1200px;
            width: 100%;
        }
        .controls-panel {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .laboratory {
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            background-color: #eef;
        }
        
        .inventory {
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: 90px;
            padding: 10px;
            background: #fff;
            border: 1px dashed #999;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        
        /* Drag und Klick Container */
        .component-drag {
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 2px;
            transition: all 0.2s;
        }
        .component-drag:active {
            cursor: grabbing;
        }
        .component-drag svg {
            pointer-events: none;
        }
        .component-drag.selected {
            background-color: #d1f2eb;
            border-radius: 4px;
            box-shadow: 0 0 8px #1abc9c;
            transform: scale(1.05);
        }

        .circuit-board {
            position: relative;
            height: 250px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }
        
        /* Leitungen */
        .wire { position: absolute; background: #000; }
        .w-bottom { top: 220px; left: 50px; width: 300px; height: 2px; }
        
        .w-left-top { top: 50px; left: 50px; width: 2px; height: 60px; }
        .w-left-bottom { top: 150px; left: 50px; width: 2px; height: 70px; }
        .w-top-left { top: 50px; left: 50px; width: 100px; height: 2px; }
        
        .w-mid-top { top: 80px; left: 200px; width: 2px; height: 30px; }
        .w-mid-bottom { top: 190px; left: 200px; width: 2px; height: 30px; }
        
        .w-right-top { top: 50px; left: 350px; width: 2px; height: 60px; }
        .w-right-bottom { top: 190px; left: 350px; width: 2px; height: 30px; }
        .w-top-right { top: 50px; left: 250px; width: 100px; height: 2px; }

        .w-v-top { top: 90px; left: 120px; width: 80px; height: 2px; }
        .w-v-bottom { top: 200px; left: 120px; width: 80px; height: 2px; }
        .w-v-left-top { top: 90px; left: 120px; width: 2px; height: 30px; }
        .w-v-left-bottom { top: 160px; left: 120px; width: 2px; height: 42px; }

        .node {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        .node-v-top { top: 91px; left: 201px; }
        .node-v-bottom { top: 201px; left: 201px; }
        .node-c-bottom { top: 221px; left: 201px; }

        .drop-zone {
            position: absolute;
            border: 2px dashed #aaa;
            background-color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone.hover, .drop-zone.ready-for-click {
            background-color: rgba(0, 172, 193, 0.1);
            border-color: #00acc1;
        }
        
        #zone-c { top: 110px; left: 180px; width: 42px; height: 80px; }
        #zone-l { top: 110px; left: 330px; width: 42px; height: 80px; }
        #zone-m { top: 120px; left: 100px; width: 42px; height: 40px; }

        .switch-container {
            position: absolute;
            top: 30px;
            left: 140px;
            width: 120px;
            height: 50px;
            z-index: 20;
            cursor: not-allowed; 
        }
        .switch-container.active {
            cursor: pointer;
        }
        .switch-lever {
            transition: transform 0.2s ease-in-out;
            transform-origin: 60px 50px;
        }
        .switch-state-left .switch-lever { transform: rotate(-59deg); }
        .switch-state-right .switch-lever { transform: rotate(59deg); }

        .status-box {
            padding: 10px;
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            border-radius: 4px;
            font-size: 0.9em;
            text-align: center;
            font-weight: bold;
        }
        .status-box.ready {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }
        .control-group label { font-weight: bold; font-size: 0.9em; }
        input[type="range"] { width: 100%; }
        
        .display-panel { 
            display: flex; 
            flex-direction: column; 
            flex-grow: 1;
        }
        canvas {
            border: 1px solid #ccc;
            background-color: #fff;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }

        /* Dynamische Anpassung für Mobilgeräte */
        @media (max-width: 1080px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            .controls-panel {
                width: 100%;
                max-width: 420px;
            }
            .display-panel {
                width: 100%;
                display: flex;
                align-items: center;
            }
            canvas {
                height: auto;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls-panel">
        <h3>Schaltplan Aufbau</h3>
        
        <div class="laboratory">
            <div class="inventory" id="inventory">
                
                <div id="comp-c" class="component-drag" draggable="true" style="width: 40px; height: 80px;">
                    <svg width="40" height="80" viewBox="0 0 40 80">
                        <line x1="20" y1="0" x2="20" y2="35" stroke="#000" stroke-width="2"/>
                        <line x1="5" y1="35" x2="35" y2="35" stroke="#000" stroke-width="2"/>
                        <line x1="5" y1="45" x2="35" y2="45" stroke="#000" stroke-width="2"/>
                        <line x1="20" y1="45" x2="20" y2="80" stroke="#000" stroke-width="2"/>
                    </svg>
                </div>
                
                <div id="comp-l" class="component-drag" draggable="true" style="width: 40px; height: 80px;">
                    <svg width="40" height="80" viewBox="0 0 40 80">
                        <line x1="20" y1="0" x2="20" y2="15" stroke="#000" stroke-width="2"/>
                        <path d="M 20 15 C 35 15, 35 27.5, 20 27.5 C 35 27.5, 35 40, 20 40 C 35 40, 35 52.5, 20 52.5 C 35 52.5, 35 65, 20 65" fill="none" stroke="#000" stroke-width="2"/>
                        <line x1="20" y1="65" x2="20" y2="80" stroke="#000" stroke-width="2"/>
                    </svg>
                </div>

                <div id="comp-m" class="component-drag" draggable="true" style="width: 40px; height: 40px;">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="15" fill="#fff" stroke="#000" stroke-width="2"/>
                        <text x="20" y="25" font-family="Arial" font-size="14" text-anchor="middle">V</text>
                        <line x1="20" y1="0" x2="20" y2="5" stroke="#000" stroke-width="2"/>
                        <line x1="20" y1="35" x2="20" y2="40" stroke="#000" stroke-width="2"/>
                    </svg>
                </div>

            </div>

            <div class="circuit-board">
                
                <svg style="position: absolute; top: 110px; left: 35px; z-index: 2;" width="30" height="40" viewBox="0 0 30 40">
                    <line x1="15" y1="0" x2="15" y2="15" stroke="#000" stroke-width="2"/>
                    <line x1="5" y1="15" x2="25" y2="15" stroke="#000" stroke-width="2"/> 
                    <line x1="10" y1="25" x2="20" y2="25" stroke="#000" stroke-width="4"/> 
                    <line x1="15" y1="25" x2="15" y2="40" stroke="#000" stroke-width="2"/>
                    <text x="2" y="12" font-family="Arial" font-size="12" font-weight="bold" fill="#e74c3c">+</text>
                    <text x="4" y="32" font-family="Arial" font-size="14" font-weight="bold" fill="#3498db">-</text>
                </svg>

                <svg id="circuit-switch" class="switch-container switch-state-left" viewBox="0 0 120 50" style="overflow: visible;">
                    <circle cx="10" cy="20" r="4" fill="#fff" stroke="#000" stroke-width="2"/>
                    <circle cx="110" cy="20" r="4" fill="#fff" stroke="#000" stroke-width="2"/>
                    <circle cx="60" cy="50" r="4" fill="#000"/>
                    <line class="switch-lever" x1="60" y1="50" x2="60" y2="-8" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                </svg>

                <div class="wire w-bottom"></div>
                
                <div class="wire w-left-top"></div>
                <div class="wire w-left-bottom"></div>
                <div class="wire w-top-left"></div>
                
                <div class="wire w-mid-top"></div>
                <div class="wire w-mid-bottom"></div>
                
                <div class="wire w-right-top"></div>
                <div class="wire w-right-bottom"></div>
                <div class="wire w-top-right"></div>

                <div class="wire w-v-top"></div>
                <div class="wire w-v-bottom"></div>
                <div class="wire w-v-left-top"></div>
                <div class="wire w-v-left-bottom"></div>

                <div class="node node-v-top"></div>
                <div class="node node-v-bottom"></div>
                <div class="node node-c-bottom"></div>

                <div class="drop-zone" id="zone-c" data-accept="comp-c"></div>
                <div class="drop-zone" id="zone-l" data-accept="comp-l"></div>
                <div class="drop-zone" id="zone-m" data-accept="comp-m"></div>
            </div>
        </div>

        <div id="status-msg" class="status-box">
            Bitte platzieren Sie die Schaltzeichen (per Mausklick oder Ziehen).
        </div>

        <div class="control-group">
            <label for="spannung">Startspannung U₀: <span id="u-val">10.0</span> V</label>
            <input type="range" id="spannung" min="1" max="20" step="0.5" value="10">
        </div>

        <div class="control-group">
            <label for="kapazitaet">Kapazität C: <span id="c-val">50</span> µF</label>
            <input type="range" id="kapazitaet" min="10" max="200" value="50">
        </div>

        <div class="control-group">
            <label for="induktivitaet">Induktivität L: <span id="l-val">1.0</span> H</label>
            <input type="range" id="induktivitaet" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>

        <div class="control-group">
            <label>Modus:</label>
            <div>
                <input type="radio" id="mode-ideal" name="mode" value="ideal" checked>
                <label for="mode-ideal">Ideal (ungedämpft)</label>
            </div>
            <div>
                <input type="radio" id="mode-real" name="mode" value="real">
                <label for="mode-real">Real (gedämpft)</label>
            </div>
        </div>
    </div>

    <div class="display-panel">
        <canvas id="oscilloscope" width="600" height="400"></canvas>
    </div>
</div>
<script>
    const draggables = document.querySelectorAll('.component-drag');
    const dropZones = document.querySelectorAll('.drop-zone');
    const statusMsg = document.getElementById('status-msg');
    const circuitSwitch = document.getElementById('circuit-switch');
    
    let circuitState = { 'comp-c': false, 'comp-l': false, 'comp-m': false };
    let selectedComponentId = null;

    draggables.forEach(draggable => {
        draggable.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', draggable.id);
            selectedComponentId = draggable.id; 
        });

        draggable.addEventListener('click', () => {
            if (draggable.getAttribute('draggable') === 'false') return; 
            
            draggables.forEach(d => d.classList.remove('selected'));
            dropZones.forEach(z => z.classList.remove('ready-for-click'));
            
            selectedComponentId = draggable.id;
            draggable.classList.add('selected');
            
            const targetZone = document.querySelector(`.drop-zone[data-accept="${selectedComponentId}"]`);
            if(targetZone) targetZone.classList.add('ready-for-click');
        });
    });

    dropZones.forEach(zone => {
        zone.addEventListener('dragover', (e) => {
            e.preventDefault(); 
            const draggedId = e.dataTransfer.types.includes('text/plain') ? 'valid' : 'invalid';
            if (draggedId) zone.classList.add('hover');
        });

        zone.addEventListener('dragleave', () => {
            zone.classList.remove('hover');
        });

        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('hover');
            
            const draggedId = e.dataTransfer.getData('text/plain');
            placeComponent(draggedId, zone);
        });

        zone.addEventListener('click', () => {
            if (selectedComponentId) {
                placeComponent(selectedComponentId, zone);
            }
        });
    });

    function placeComponent(compId, zone) {
        const acceptedId = zone.getAttribute('data-accept');
        
        if (compId === acceptedId) {
            const element = document.getElementById(compId);
            zone.appendChild(element);
            
            element.setAttribute('draggable', 'false'); 
            element.style.cursor = 'default';
            element.classList.remove('selected');
            zone.style.border = 'none'; 
            zone.classList.remove('ready-for-click');
            
            circuitState[compId] = true;
            selectedComponentId = null; 
            
            checkCircuitReady();
        } else {
            zone.style.borderColor = "#e74c3c";
            setTimeout(() => {
                if(!circuitState[acceptedId]) zone.style.borderColor = "#aaa";
            }, 300);
        }
    }

    function checkCircuitReady() {
        if (circuitState['comp-c'] && circuitState['comp-l'] && circuitState['comp-m']) {
            statusMsg.textContent = "Aufbau vollständig. Klicken Sie auf den Schalter, um die Schwingung auszulösen.";
            statusMsg.classList.add('ready');
            circuitSwitch.classList.add('active');
            resetToCharging();
        }
    }

    const canvas = document.getElementById('oscilloscope');
    const ctx = canvas.getContext('2d');
    
    const internalWidth = 600;
    const internalHeight = 400;
    
    // UI Elemente erfassen
    const sliderU = document.getElementById('spannung');
    const sliderC = document.getElementById('kapazitaet');
    const sliderL = document.getElementById('induktivitaet');
    const displayU = document.getElementById('u-val');
    const displayC = document.getElementById('c-val');
    const displayL = document.getElementById('l-val');
    const radiosMode = document.getElementsByName('mode');

    let animationId;
    let isRunning = false;
    let switchPosition = 'charging'; 
    
    let t_sim = 0;               
    const dt = 0.0002;           
    const animationSpeed = 0.003; 
    
    const maxTimeS = 0.2; 
    const timeScale = (internalWidth - 40) / maxTimeS; 
    const voltScale = 8; // Skalierung leicht angepasst, damit 20V noch ins Display passen
    const centerY = internalHeight / 2;

    // Event Listener für Regler
    sliderU.addEventListener('input', (e) => {
        displayU.textContent = parseFloat(e.target.value).toFixed(1);
        if(switchPosition === 'charging') {
            resetToCharging();
        } else if(switchPosition === 'oscillating') {
            startOscillation();
        }
    });

    sliderC.addEventListener('input', (e) => {
        displayC.textContent = e.target.value;
        if(switchPosition === 'oscillating') startOscillation();
    });
    
    sliderL.addEventListener('input', (e) => {
        displayL.textContent = parseFloat(e.target.value).toFixed(1);
        if(switchPosition === 'oscillating') startOscillation();
    });

    radiosMode.forEach(radio => {
        radio.addEventListener('change', () => {
            if(switchPosition === 'oscillating') startOscillation();
        });
    });

    circuitSwitch.addEventListener('click', () => {
        if (!circuitSwitch.classList.contains('active')) {
            alert("Bitte setzen Sie zuerst alle Bauteile in den Schaltplan ein.");
            return;
        }

        if (switchPosition === 'charging') {
            circuitSwitch.classList.remove('switch-state-left');
            circuitSwitch.classList.add('switch-state-right');
            switchPosition = 'oscillating';
            startOscillation();
        } else {
            circuitSwitch.classList.remove('switch-state-right');
            circuitSwitch.classList.add('switch-state-left');
            switchPosition = 'charging';
            resetToCharging();
        }
    });

    function drawAxes() {
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        ctx.beginPath();
        
        ctx.moveTo(0, centerY);
        ctx.lineTo(internalWidth, centerY);
        
        ctx.moveTo(40, 0);
        ctx.lineTo(40, internalHeight);
        ctx.stroke();

        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.fillText('U (V)', 5, 15);
        ctx.fillText('20', 15, centerY - 20 * voltScale + 4);
        ctx.fillText('10', 15, centerY - 10 * voltScale + 4);
        ctx.fillText('0', 25, centerY + 12);
        ctx.fillText('-10', 10, centerY + 10 * voltScale + 4);
        ctx.fillText('-20', 10, centerY + 20 * voltScale + 4);
        
        ctx.font = 'bold 12px Arial';
        ctx.fillText('t (ms)', internalWidth - 45, centerY - 10);
        ctx.font = '12px Arial';
        
        for(let t_ms = 0; t_ms <= 200; t_ms += 50) {
            let t_s = t_ms / 1000;
            let x = 40 + t_s * timeScale;
            ctx.beginPath();
            ctx.moveTo(x, centerY - 5);
            ctx.lineTo(x, centerY + 5);
            ctx.stroke();
            if(t_ms > 0) {
                ctx.fillText(t_ms, x - 10, centerY + 20);
            }
        }
    }

    function resetToCharging() {
        if (animationId) cancelAnimationFrame(animationId);
        isRunning = false;
        ctx.clearRect(0, 0, internalWidth, internalHeight);
        drawAxes();
        
        let currentU0 = parseFloat(sliderU.value);

        ctx.beginPath();
        ctx.strokeStyle = '#27ae60'; 
        ctx.lineWidth = 2.5;
        ctx.moveTo(40, centerY - currentU0 * voltScale);
        ctx.lineTo(internalWidth, centerY - currentU0 * voltScale);
        ctx.stroke();
    }

    function getMode() {
        for (let radio of radiosMode) {
            if (radio.checked) return radio.value;
        }
        return 'ideal';
    }

    function startOscillation() {
        if (animationId) cancelAnimationFrame(animationId);
        ctx.clearRect(0, 0, internalWidth, internalHeight);
        drawAxes();
        
        t_sim = 0; 
        isRunning = true;
        
        animate();
    }

    function animate() {
        if (!isRunning) return;

        let currentU0 = parseFloat(sliderU.value);
        let C = parseFloat(sliderC.value) * 0.000001; 
        let L = parseFloat(sliderL.value);
        let mode = getMode();

        let R_sim = (mode === 'real') ? 45 : 0; 

        let omega = 1 / Math.sqrt(L * C);
        let delta = R_sim / (2 * L);
        let omega_d = (omega * omega > delta * delta) ? Math.sqrt(omega * omega - delta * delta) : 0;

        let target_t = t_sim + animationSpeed;

        ctx.beginPath();
        ctx.strokeStyle = '#27ae60'; 
        ctx.lineWidth = 2.5;
        
        let startU = currentU0 * Math.exp(-delta * t_sim) * Math.cos(omega_d * t_sim);
        ctx.moveTo(40 + t_sim * timeScale, centerY - startU * voltScale);

        while (t_sim < target_t && t_sim <= maxTimeS) {
            t_sim += dt; 
            let U = currentU0 * Math.exp(-delta * t_sim) * Math.cos(omega_d * t_sim);
            let x = 40 + t_sim * timeScale;
            let y = centerY - U * voltScale;
            ctx.lineTo(x, y);
        }
        ctx.stroke();

        if (t_sim < maxTimeS) {
            animationId = requestAnimationFrame(animate);
        } else {
            isRunning = false;
        }
    }

    drawAxes();
</script>
</body>
</html>
